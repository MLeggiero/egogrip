<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 640" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1100" height="640" fill="#f8fafc"/>
  <text x="550" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#0f172a">egogrip — data flow (proposed system)</text>

  <!-- config band -->
  <rect x="400" y="46" width="320" height="32" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="560" y="67" text-anchor="middle" font-size="12.5" fill="#7c2d12">capture_config.json — what to record</text>
  <path d="M560,78 L560,92" stroke="#f59e0b" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- sensors group -->
  <rect x="24" y="92" width="212" height="372" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="38" y="114" font-size="14" font-weight="700" fill="#0f172a">Physical sensors</text>

  <rect x="36" y="124" width="188" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="48" y="142" font-size="12" fill="#0f172a">Ego cameras (front)</text>
  <text x="48" y="159" font-size="10" fill="#475569">RGB 30 fps -> ego.mp4</text>

  <rect x="36" y="178" width="188" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="48" y="196" font-size="12" fill="#0f172a">Wrist camera (UVC)</text>
  <text x="48" y="213" font-size="10" fill="#475569">RGB 30 fps -> wrist0.mp4</text>

  <rect x="36" y="232" width="188" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="48" y="250" font-size="12" fill="#0f172a">Controllers x2 (6-DoF)</text>
  <text x="48" y="267" font-size="10" fill="#475569">72-90 Hz -> gripper_pose</text>

  <rect x="36" y="286" width="188" height="44" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.4"/>
  <text x="48" y="304" font-size="12" fill="#0f172a">RP2040 + AS5600</text>
  <text x="48" y="321" font-size="10" fill="#475569">width 200 Hz (serial)</text>

  <rect x="36" y="340" width="188" height="44" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="48" y="358" font-size="12" fill="#334155">Tactile (future)</text>
  <text x="48" y="375" font-size="10" fill="#64748b">plug-in ready</text>

  <!-- internal / XR arrows (ego + controllers bypass the hub) -->
  <path d="M236,146 L384,146" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M236,254 L384,254" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="310" y="138" text-anchor="middle" font-size="9.5" fill="#475569">internal / XR</text>

  <!-- USB sensors route through the powered hub -->
  <path d="M224,200 L242,200 L242,300 L256,300" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <path d="M224,308 L256,316" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>

  <!-- powered USB-C hub node -->
  <rect x="256" y="268" width="104" height="84" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.6"/>
  <text x="308" y="300" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">Powered</text>
  <text x="308" y="316" text-anchor="middle" font-size="11" font-weight="700" fill="#713f12">USB-C hub</text>
  <text x="308" y="334" text-anchor="middle" font-size="9.5" fill="#854d0e">data + PD charge</text>

  <!-- hub -> APK (single USB-C cable) -->
  <path d="M360,310 L384,310" stroke="#475569" stroke-width="1.8" fill="none" marker-end="url(#arrow)"/>
  <text x="372" y="302" text-anchor="middle" font-size="9" fill="#475569">USB-C</text>

  <!-- APK group -->
  <rect x="384" y="92" width="288" height="372" rx="12" fill="#f0fdfa" stroke="#14b8a6" stroke-width="1.6"/>
  <text x="396" y="114" font-size="12.5" font-weight="700" fill="#0f172a">PICO 4 Ultra Enterprise — egogrip APK</text>

  <rect x="396" y="126" width="264" height="120" rx="8" fill="#ffffff" stroke="#14b8a6" stroke-width="1.3"/>
  <text x="408" y="145" font-size="12" font-weight="700" fill="#0f766e">Unity (XR host)</text>
  <text x="408" y="163" font-size="10.5" fill="#0f172a">• controller pose + offset -> TCP</text>
  <text x="408" y="180" font-size="10.5" fill="#0f172a">• enterprise ego cam -> Surface</text>
  <text x="408" y="197" font-size="10.5" fill="#0f172a">• in-VR GUI + Zero-gripper tare</text>
  <text x="408" y="214" font-size="10.5" fill="#0f172a">• CaptureManager reads config</text>
  <text x="408" y="231" font-size="10.5" fill="#0f172a">• config-driven manifest writer</text>

  <rect x="396" y="254" width="264" height="90" rx="8" fill="#ffffff" stroke="#14b8a6" stroke-width="1.3"/>
  <text x="408" y="273" font-size="12" font-weight="700" fill="#0f766e">Native AAR (USB / codecs)</text>
  <text x="408" y="291" font-size="10.5" fill="#0f172a">• UVC wrist cam -> H.264 MP4</text>
  <text x="408" y="308" font-size="10.5" fill="#0f172a">• USB-serial reader (RP2040)</text>
  <text x="408" y="325" font-size="10.5" fill="#0f172a">• MediaCodec encoder (ego/wrist)</text>

  <rect x="396" y="352" width="264" height="48" rx="8" fill="#ecfeff" stroke="#06b6d4" stroke-width="1.4"/>
  <text x="528" y="371" text-anchor="middle" font-size="11" font-weight="700" fill="#0e7490">one monotonic clock</text>
  <text x="528" y="388" text-anchor="middle" font-size="9.5" fill="#0e7490">SystemClock.elapsedRealtimeNanos()</text>

  <!-- APK -> episode -->
  <path d="M672,270 L700,270" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="686" y="262" text-anchor="middle" font-size="9" fill="#475569">writes</text>

  <!-- episode group -->
  <rect x="700" y="120" width="160" height="300" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.6"/>
  <text x="714" y="142" font-size="13" font-weight="700" fill="#0f172a">Episode folder</text>
  <text x="714" y="158" font-size="9.5" fill="#92400e">one per take, on headset</text>
  <rect x="712" y="168" width="136" height="200" rx="6" fill="#ffffff" stroke="#fcd34d" stroke-width="1.2"/>
  <text x="722" y="188" font-size="10.5" font-family="monospace" fill="#0f172a">manifest.json</text>
  <text x="722" y="206" font-size="10.5" font-family="monospace" fill="#0f172a">ego.mp4</text>
  <text x="722" y="224" font-size="10.5" font-family="monospace" fill="#0f172a">ego_frames.csv</text>
  <text x="722" y="242" font-size="10.5" font-family="monospace" fill="#0f172a">wrist0.mp4</text>
  <text x="722" y="260" font-size="10.5" font-family="monospace" fill="#0f172a">wrist0_frames.csv</text>
  <text x="722" y="278" font-size="10.5" font-family="monospace" fill="#0f172a">gripper_pose.csv</text>
  <text x="722" y="296" font-size="10.5" font-family="monospace" fill="#0f172a">gripper_state.csv</text>
  <text x="722" y="314" font-size="10.5" font-family="monospace" fill="#0f172a">poses.jsonl</text>
  <text x="722" y="338" font-size="9.5" fill="#92400e">every row carries</text>
  <text x="722" y="353" font-size="9.5" fill="#92400e">monotonic_ns</text>

  <!-- episode -> pipeline -->
  <path d="M860,270 L884,270" stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <text x="872" y="262" text-anchor="middle" font-size="9" fill="#475569">pull</text>

  <!-- pipeline group -->
  <rect x="884" y="120" width="150" height="300" rx="12" fill="#faf5ff" stroke="#a855f7" stroke-width="1.6"/>
  <text x="898" y="142" font-size="13" font-weight="700" fill="#0f172a">Offline pipeline</text>
  <text x="898" y="158" font-size="9.5" fill="#6b21a8">any PC, after the fact</text>

  <rect x="898" y="168" width="122" height="30" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="959" y="187" text-anchor="middle" font-size="11" fill="#0f172a">validate</text>
  <path d="M959,198 L959,210" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="898" y="210" width="122" height="40" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="959" y="228" text-anchor="middle" font-size="11" fill="#0f172a">align +</text>
  <text x="959" y="243" text-anchor="middle" font-size="11" fill="#0f172a">resample 30 Hz</text>
  <path d="M959,250 L959,262" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="898" y="262" width="122" height="30" rx="6" fill="#ffffff" stroke="#a855f7" stroke-width="1.2"/>
  <text x="959" y="281" text-anchor="middle" font-size="11" fill="#0f172a">export</text>
  <path d="M959,292 L959,304" stroke="#475569" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="898" y="304" width="122" height="46" rx="6" fill="#f3e8ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="959" y="325" text-anchor="middle" font-size="11" font-weight="700" fill="#6b21a8">LeRobot v2</text>
  <text x="959" y="340" text-anchor="middle" font-size="10" fill="#6b21a8">dataset</text>

  <!-- calibration band -->
  <rect x="450" y="500" width="372" height="32" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="636" y="521" text-anchor="middle" font-size="11.5" fill="#3730a3">calibration.json — counts to width · tare · intrinsics</text>
  <path d="M450,516 L440,516 L440,464" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="430" y="486" text-anchor="middle" font-size="9.5" fill="#3730a3">preview</text>
  <path d="M822,516 L959,516 L959,420" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="959" y="486" text-anchor="middle" font-size="9.5" fill="#3730a3">authoritative</text>

  <!-- caption -->
  <text x="550" y="600" text-anchor="middle" font-size="11.5" fill="#334155">Native sensor rates share one clock; mismatched rates (30 / 50 / 60 Hz) are resampled offline onto a 30 Hz grid — no capture-time sync.</text>
</svg>
